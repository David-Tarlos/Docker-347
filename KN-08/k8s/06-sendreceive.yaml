apiVersion: apps/v1
kind: Deployment
metadata:
  name: sendreceive-deployment
  labels:
    app: sendreceive
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sendreceive
  template:
    metadata:
      labels:
        app: sendreceive
    spec:
      containers:
      - name: sendreceive
        image: leonwul/m347-kn08:sendreceive
        ports:
        - containerPort: 8003
        env:
        - name: ACCOUNT_URL
          valueFrom:
            configMapKeyRef:
              name: m347-config
              key: ACCOUNT_URL
---
apiVersion: v1
kind: Service
metadata:
  name: sendreceive-service
spec:
  type: NodePort
  selector:
    app: sendreceive
  ports:
    - protocol: TCP
      port: 8003
      targetPort: 8003
      nodePort: 30103
