apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: leonwul/m347-kn08:frontend
        ports:
        - containerPort: 80
        # Pulls all FRONTEND_MS_* keys from the ConfigMap as env vars,
        # which the runtime entrypoint then substitutes into the bundled JS.
        envFrom:
        - configMapRef:
            name: m347-config
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30101
