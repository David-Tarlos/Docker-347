services:
  web:
    image: leonwul/m347:kn02b-web
    container_name: m347-kn04b-web
    ports:
      - "80:80"
    networks:
      - kn04b-net
    depends_on:
      - db

  db:
    image: leonwul/m347:kn02b-db
    container_name: m347-kn04b-db
    networks:
      - kn04b-net

networks:
  kn04b-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          ip_range: 172.20.5.0/24
          gateway: 172.20.5.254
