#cloud-config
# Quelle: TBZ-Anleitung MicroK8s (microk8s.yaml)
# https://thenewstack.io/deploy-a-kubernetes-cluster-on-ubuntu-server-with-microk8s/
#
# Diese Datei ist 1:1 die vom Lehrer bereitgestellte microk8s.yaml.
# Einziger Zusatz: Leons eigener SSH-Pubkey-Slot (siehe Kommentar).

users:
  - name: ubuntu
    sudo: ALL=(ALL) NOPASSWD:ALL
    groups: users, admin, microk8s
    home: /home/ubuntu
    shell: /bin/bash
    ssh_authorized_keys:
      - ssh-rsa  teacher
      - ssh-rsa  leon-vockey

groups:
  - microk8s

system_info:
  default_user:
    groups: [microk8s]

ssh_pwauth: false
disable_root: false

package_update: true
package_upgrade: true

packages:
  - curl

runcmd:
  - sudo snap install microk8s --classic
  - mkdir /home/ubuntu/.kube
